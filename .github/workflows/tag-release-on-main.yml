name: Tag release on main

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: tag-release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag_release:
    name: Create Git Tag
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Create and push tag
        run: |
          set -euo pipefail

          release_branch="${{ github.event.pull_request.head.ref }}"
          version="${release_branch#release/}"

          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release branch ${release_branch} does not follow release/vX.Y.Z."
            exit 1
          fi

          if git show-ref --tags --verify --quiet "refs/tags/$version"; then
            echo "Tag ${version} already exists."
            exit 0
          fi

          git tag -a "$version" -m "Release ${version}"
          git push origin "$version"
