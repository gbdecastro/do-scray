name: Auto release from develop

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

concurrency:
  group: auto-release-develop
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  build_and_test:
    name: Build and Test
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          fetch-tags: true

      - name: Build application image
        run: docker compose build crawler

      - name: Set up Python for tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          set -uo pipefail
          status=0

          python -m coverage run --source=diario_oficial -m unittest discover -s tests -t . || status=$?
          python -m coverage report --fail-under=100 || status=$?
          python -m coverage xml
          python -m coverage html

          exit "$status"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-release-from-develop
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

  create_release_branch:
    name: Create Release Branch
    needs: build_and_test
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.release.outputs.release_branch }}
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          fetch-tags: true

      - name: Create release branch
        id: release
        run: |
          set -euo pipefail

          git fetch --tags origin

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"

          if [ -z "$latest_tag" ]; then
            next_version="0.1.0"
          else
            version="${latest_tag#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${version##*.}"
            next_version="$major.$minor.$((patch + 1))"
          fi

          release_branch="release/v${next_version}"

          git checkout -b "$release_branch"
          git push origin "$release_branch"

          echo "release_branch=$release_branch" >> "$GITHUB_OUTPUT"

  delete_merged_feature_branch:
    name: Delete merged feature branch
    needs: create_release_branch
    if: startsWith(github.event.pull_request.head.ref, 'feature/') && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Delete branch
        run: |
          set -euo pipefail

          feature_branch="${{ github.event.pull_request.head.ref }}"
          git push origin --delete "$feature_branch"

  open_release_pr:
    name: Open Release PR
    needs: create_release_branch
    runs-on: ubuntu-latest
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Open release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ needs.create_release_branch.outputs.release_branch }}
        run: |
          set -euo pipefail

          existing_prs="$(gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq 'length')"

          if [ "$existing_prs" -gt 0 ]; then
            echo "An open PR from ${RELEASE_BRANCH} to main already exists."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release ${RELEASE_BRANCH}" \
            --body "Automated release PR created after merging into \`develop\`."
