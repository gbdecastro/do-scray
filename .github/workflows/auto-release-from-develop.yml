name: Auto release from develop

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

concurrency:
  group: auto-release-develop
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          fetch-tags: true

      - name: Create release branch
        run: |
          set -euo pipefail

          git fetch --tags origin

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"

          if [ -z "$latest_tag" ]; then
            next_version="0.1.0"
          else
            version="${latest_tag#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${version##*.}"
            next_version="$major.$minor.$((patch + 1))"
          fi

          release_branch="release/v${next_version}"

          git checkout -b "$release_branch"
          git push origin "$release_branch"

          echo "RELEASE_BRANCH=$release_branch" >> "$GITHUB_ENV"

      - name: Open release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          existing_prs="$(gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq 'length')"

          if [ "$existing_prs" -gt 0 ]; then
            echo "An open PR from ${RELEASE_BRANCH} to main already exists."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$RELEASE_BRANCH" \
            --title "Release ${RELEASE_BRANCH}" \
            --body "Automated release PR created after merging into \`develop\`."
