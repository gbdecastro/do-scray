name: CI Coverage

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build application image
        run: docker compose build crawler

      - name: Set up Python for tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: |
          set -uo pipefail
          status=0

          python -m coverage run --source=diario_oficial -m unittest discover -s tests -t . || status=$?
          python -m coverage report --fail-under=90 || status=$?
          python -m coverage xml
          python -m coverage html

          exit "$status"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ci
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn
